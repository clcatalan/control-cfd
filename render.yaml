services:
  - type: web
    name: control-cfd
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm ci --include=dev && npm run build && cd ../admin && npm ci --include=dev && npm run build && cd ../backend && npm ci
    startCommand: node backend/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
